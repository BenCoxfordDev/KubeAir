# Dependency audit configuration for KubeAir
# Generated for licensing compliance audit before open-source release

[advisories]
# The advisories table is used to record and deny crate advisories
# https://deps.rs/
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db/raw/main/db.json.gz"]
vulnerability = "warn"
unmaintained = "warn"
unsound = "warn"
yanked = "warn"

[licenses]
# Lint level for licenses
unlicensed = "warn"
copyleft = "warn"
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 OR MIT",
  "MIT OR Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "0BSD",
  "Zlib",
  "Unlicense",
]
# Lint level for licenses considered copyleft
copyleft-exceptions = []
# Blanket approval or denial for OSI-approved or FSF Free/Libre licenses
allow-osi-fsf-free = "both"
# Lint level used when no other predicates are matched
default = "warn"
# The confidence threshold for detecting a license from license text.
confidence-threshold = 0.8
# Some crates don't have a detectable license
allow-unknown = ["jsonpath-rust"]

[bans]
# Lint level for when multiple versions of the same crate are detected
multiple-versions = "warn"
# Lint level used when a crate marked as 'wildcard-dependencies' has a wildcard version requirement
wildcards = "warn"
# The graph highlighting used when creating dotgraphs for crates with multiple versions
# * lowest-version - The path to the lowest versioned duplicate is highlighted
# * simplest-path - The path to the version with the fewest edges is highlighted
# * all - Both lowest-version and simplest-path are used
highlight = "lowest-version"
# List of explicitly allowed duplicate crates
allow = []
# List of explicitly denied crates
deny = []
# Certain crates/versions that will be skipped when doing duplicate detection
skip = []
# Similarly named crates that are allowed to coexist
skip-tree = []

[sources]
# Lint level for what to happen when a crate from a crate registry that is not in the allow list is detected
unknown-registry = "warn"
# Lint level for what to happen when a crate from a git repository that is not in the allow list is detected
unknown-git = "warn"
# The lint level used when a detected crate source does not conform to the requirements for a crate source
invalid = "warn"
# List of allowed crate registries
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# List of allowed Git repositories
allow-git = []
