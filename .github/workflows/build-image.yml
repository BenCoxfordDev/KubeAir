name: Build Image

# Builds and pushes the hermetic CI build image to GHCR whenever the image
# definition changes, or on demand.
#
# Image: ghcr.io/bencoxforddev/kubeair/build:<k8s-major>.<k8s-minor>
# e.g.   ghcr.io/bencoxforddev/kubeair/build:1.35
#
# The tag tracks the Kubernetes version baked into the image (kubectl/kubeadm).
# The canonical version is in .version at the workspace root.
# Bump .version (and the corresponding pins in MODULE.bazel) when upgrading Kubernetes.

on:
  pull_request:
    paths:
      - 'hack/build-image/**'
      - 'MODULE.bazel'
      - '.version'
  push:
    branches:
      - main
    paths:
      - 'hack/build-image/**'
      - 'MODULE.bazel'
      - '.version'
  workflow_dispatch:
    inputs:
      kubernetes_version:
        description: "Kubernetes major.minor tag for the image (e.g. 1.35). Defaults to version in .version file."
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/bencoxforddev/kubeair/build

jobs:
  setup:
    runs-on: ubuntu-24.04
    outputs:
      k8s_tag: ${{ steps.read.outputs.k8s_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve Kubernetes image tag
        id: read
        env:
          INPUT_K8S_VERSION: ${{ inputs.kubernetes_version }}
        run: |
          if [[ -n "$INPUT_K8S_VERSION" ]]; then
            K8S_TAG="$INPUT_K8S_VERSION"
          else
            K8S_VERSION=$(cat .version | tr -d '[:space:]')
            K8S_TAG=$(echo "$K8S_VERSION" | sed 's/^v//' | cut -d. -f1,2)
          fi
          echo "k8s_tag=${K8S_TAG}" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: [setup]
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            bazel_target: //hack/build-image:push_amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            bazel_target: //hack/build-image:push_arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.9.1
        with:
          bazelisk-cache: true
          disk-cache: kubeair-build-image-${{ matrix.arch }}
          repository-cache: true
          save-cache: ${{ github.ref == 'refs/heads/main' }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push ${{ matrix.arch }} image
        run: |
          bazel run ${{ matrix.bazel_target }} \
            --@rules_img//img/settings:credential_helper= \
            -- --tag "tmp-${{ github.sha }}-${{ matrix.arch }}"

  push:
    needs: [build-and-push, setup]
    runs-on: ubuntu-24.04
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Push multi-arch manifest index
        run: |
          crane index append \
            -t ${{ env.IMAGE }}:${{ needs.setup.outputs.k8s_tag }} \
            -m ${{ env.IMAGE }}:tmp-${{ github.sha }}-amd64 \
            -m ${{ env.IMAGE }}:tmp-${{ github.sha }}-arm64

      - name: Delete temporary arch tags
        run: |
          crane delete ${{ env.IMAGE }}:tmp-${{ github.sha }}-amd64 || true
          crane delete ${{ env.IMAGE }}:tmp-${{ github.sha }}-arm64 || true
