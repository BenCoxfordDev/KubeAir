name: Build Image

# Builds and pushes the hermetic CI build image to GHCR whenever the image
# definition changes, or on demand.
#
# Image: ghcr.io/bencoxforddev/kubeair/build:<k8s-major>.<k8s-minor>
# e.g.   ghcr.io/bencoxforddev/kubeair/build:1.33
#
# The tag tracks the Kubernetes version baked into the image (kubectl/kubeadm).
# Bump KUBERNETES_VERSION below (and the corresponding pins in MODULE.bazel)
# when upgrading Kubernetes.

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - 'hack/build-image/**'
      - 'MODULE.bazel'
  workflow_dispatch:
    inputs:
      kubernetes_version:
        description: "Kubernetes major.minor tag to apply to the image (e.g. 1.33)"
        required: false
        default: "1.33"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  K8S_TAG: ${{ inputs.kubernetes_version || '1.33' }}
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/bencoxforddev/kubeair/build

jobs:
  build-and-push:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            bazel_target: //hack/build-image:push_amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            bazel_target: //hack/build-image:push_arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.9.1
        with:
          bazelisk-cache: true
          disk-cache: kubeair-build-image-${{ matrix.arch }}
          repository-cache: true
          save-cache: ${{ github.ref == 'refs/heads/main' }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push ${{ matrix.arch }} image
        run: |
          bazel run ${{ matrix.bazel_target }} \
            --@rules_img//img/settings:credential_helper= \
            -- --tag "tmp-${{ github.sha }}-${{ matrix.arch }}"

  push:
    needs: build-and-push
    runs-on: ubuntu-24.04
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Push multi-arch manifest index
        run: |
          crane index append \
            -t ${{ env.IMAGE }}:${{ env.K8S_TAG }} \
            -m ${{ env.IMAGE }}:tmp-${{ github.sha }}-amd64 \
            -m ${{ env.IMAGE }}:tmp-${{ github.sha }}-arm64

      - name: Delete temporary arch tags
        run: |
          crane delete ${{ env.IMAGE }}:tmp-${{ github.sha }}-amd64 || true
          crane delete ${{ env.IMAGE }}:tmp-${{ github.sha }}-arm64 || true
