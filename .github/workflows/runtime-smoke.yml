name: Smoke/Conformance Tests
on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'rust-toolchain.toml'
      - 'crates/**/*.rs'
      - 'tests/**/*.rs'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  version:
    runs-on: ubuntu-24.04
    outputs:
      k8s_tag: ${{ steps.read.outputs.k8s_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Read Kubernetes image tag from .version
        id: read
        run: |
          K8S_VERSION=$(cat .version | tr -d '[:space:]')
          K8S_TAG=$(echo "$K8S_VERSION" | sed 's/^v//' | cut -d. -f1,2)
          echo "k8s_tag=${K8S_TAG}" >> "$GITHUB_OUTPUT"

  check-changes:
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check relevant paths
        id: filter
        shell: bash
        run: |
          CHANGED=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")
          if echo "$CHANGED" | grep -qE '^(Cargo\.lock$|Cargo\.toml$|rust-toolchain\.toml$|crates/.*\.rs$|tests/.*\.rs$|\.github/workflows/runtime-smoke\.yml$)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  runtime-smoke:
    needs: [check-changes, version]
    if: always() && (github.event_name != 'pull_request' || needs.check-changes.outputs.relevant == 'true')
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/bencoxforddev/kubeair/build:${{ needs.version.outputs.k8s_tag }}
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: kubeair
          repository-cache: true
          cache-save: ${{ github.ref == 'refs/heads/main' }}

      - name: Ensure bazel symlink
        run: ln -sf "$(which bazelisk)" /usr/local/bin/bazel

      - name: Provision containerd and CNI
        shell: bash
        run: |
          mkdir -p /opt/cni /etc/cni/net.d
          if [[ ! -e /opt/cni/bin ]]; then
            ln -s /usr/lib/cni /opt/cni/bin
          fi

          cat <<'EOF' > /etc/cni/net.d/10-kubelet-rs-ci.conflist
          {
            "cniVersion": "1.0.0",
            "name": "kube-air-ci",
            "plugins": [
              {
                "type": "bridge",
                "bridge": "cni0",
                "isGateway": true,
                "ipMasq": true,
                "promiscMode": true,
                "ipam": {
                  "type": "host-local",
                  "ranges": [
                    [
                      {
                        "subnet": "10.88.0.0/16"
                      }
                    ]
                  ],
                  "routes": [
                    {
                      "dst": "0.0.0.0/0"
                    }
                  ]
                }
              },
              {
                "type": "portmap",
                "capabilities": {
                  "portMappings": true
                }
              }
            ]
          }
          EOF

          # Ensure containerd service is started
          echo "Starting containerd..."
          mkdir -p /run/containerd /var/lib/containerd /etc/containerd
          if [[ ! -f /etc/containerd/config.toml ]]; then
            containerd config default > /etc/containerd/config.toml
          fi
          nohup containerd >/tmp/containerd.log 2>&1 &

          # Wait for containerd socket file to exist
          echo "Waiting for containerd socket to be ready..."
          for i in $(seq 1 30); do
            if [[ -S /run/containerd/containerd.sock ]]; then
              echo "Socket ready."
              break
            fi
            if [[ $i -eq 30 ]]; then
              echo "ERROR: containerd socket never appeared after 30s"
              tail -50 /tmp/containerd.log || true
              exit 1
            fi
            echo "Attempt $i/30: Waiting for socket..."
            sleep 1
          done

      - name: Run conformance smoke suite
        shell: bash
        run: |
          just conformance

      - name: Run smoke suite
        shell: bash
        run: |
          just smoke