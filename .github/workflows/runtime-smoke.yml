name: Smoke/Conformance Tests
on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'rust-toolchain.toml'
      - 'crates/**/*.rs'
      - 'tests/**/*.rs'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  check-changes:
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check relevant paths
        id: filter
        shell: bash
        run: |
          CHANGED=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")
          if echo "$CHANGED" | grep -qE '^(Cargo\.lock$|Cargo\.toml$|rust-toolchain\.toml$|crates/.*\.rs$|tests/.*\.rs$|\.github/workflows/runtime-smoke\.yml$)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  runtime-smoke:
    needs: [check-changes]
    if: always() && (github.event_name != 'pull_request' || needs.check-changes.outputs.relevant == 'true')
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/bencoxforddev/kubeair/build:1.33
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.9.1
        with:
          bazelisk-cache: true
          disk-cache: kubeair
          repository-cache: true
          save-cache: ${{ github.ref == 'refs/heads/main' }}

      - name: Provision containerd and CNI
        shell: bash
        run: |
          sudo mkdir -p /opt/cni /etc/cni/net.d
          if [[ ! -e /opt/cni/bin ]]; then
            sudo ln -s /usr/lib/cni /opt/cni/bin
          fi

          cat <<'EOF' | sudo tee /etc/cni/net.d/10-kubelet-rs-ci.conflist >/dev/null
          {
            "cniVersion": "1.0.0",
            "name": "kube-air-ci",
            "plugins": [
              {
                "type": "bridge",
                "bridge": "cni0",
                "isGateway": true,
                "ipMasq": true,
                "promiscMode": true,
                "ipam": {
                  "type": "host-local",
                  "ranges": [
                    [
                      {
                        "subnet": "10.88.0.0/16"
                      }
                    ]
                  ],
                  "routes": [
                    {
                      "dst": "0.0.0.0/0"
                    }
                  ]
                }
              },
              {
                "type": "portmap",
                "capabilities": {
                  "portMappings": true
                }
              }
            ]
          }
          EOF

          # Ensure containerd service is started
          echo "Starting containerd service..."
          sudo systemctl start containerd 2>&1 || {
            echo "systemctl start failed, starting manually..."
            sudo mkdir -p /run/containerd
            sudo nohup containerd >/tmp/containerd.log 2>&1 &
          }
          
          # Wait for containerd socket file to exist
          echo "Waiting for containerd socket to be ready..."
          max_attempts=60
          attempt=0
          while [[ ! -S /run/containerd/containerd.sock ]]; do
            if [[ $attempt -ge $max_attempts ]]; then
              echo "ERROR: Containerd socket failed to appear after $max_attempts attempts"
              echo "Systemd status:"
              sudo systemctl status containerd 2>&1 || true
              echo "Containerd logs (last 100 lines):"
              tail -100 /tmp/containerd.log 2>&1 || true
              ls -la /run/containerd/ 2>&1 || true
              exit 1
            fi
            echo "Attempt $((attempt + 1))/$max_attempts: Waiting for socket..."
            sleep 1
            ((attempt++))
          done
          
          # Verify ctr can connect to the socket
          echo "Socket ready. Verifying ctr connectivity..."
          for i in {1..10}; do
            if sudo timeout 2 ctr version >/dev/null 2>&1; then
              echo "✓ Containerd is ready"
              break
            fi
            if [[ $i -eq 10 ]]; then
              echo "ERROR: ctr version failed even though socket exists"
              echo "Socket file status:"
              ls -la /run/containerd/containerd.sock
              echo "Systemd status:"
              sudo systemctl status containerd 2>&1 || true
              echo "Containerd logs (last 100 lines):"
              tail -100 /tmp/containerd.log 2>&1 || true
              exit 1
            fi
            echo "  ctr attempt $i/10, retrying..."
            sleep 1
          done
          
          sudo ctr version
          
          # Verify CNI plugins
          echo "✓ CNI plugins available:"
          ls -1 /opt/cni/bin | grep -E '^(bridge|host-local|portmap)$'

      - name: Run conformance smoke suite
        shell: bash
        run: |
          just conformance

      - name: Run smoke suite
        shell: bash
        run: |
          just smoke