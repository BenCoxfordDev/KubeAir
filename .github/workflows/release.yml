name: Release

on:
  push:
    branches:
      - main
    paths:
      - Cargo.toml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-24.04

    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.tag_check.outputs.should_release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION_RAW="$(awk '
            /^\[workspace\.package\]/ { in_section=1; next }
            in_section && /^\[/ { in_section=0 }
            in_section && /^version[[:space:]]*=/ {
              if (match($0, /"([^"]+)"/, m)) {
                print m[1]
                exit
              }
            }
          ' Cargo.toml)"

          if [[ -z "$VERSION_RAW" ]]; then
            echo "Could not read workspace.package version from Cargo.toml"
            exit 1
          fi

          if [[ ! "$VERSION_RAW" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format in Cargo.toml: $VERSION_RAW"
            echo "Expected format: MAJOR.MINOR.PATCH"
            exit 1
          fi

          VERSION="v${VERSION_RAW}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Check tag availability
        id: tag_check
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${VERSION}" > /dev/null 2>&1; then
            echo "Tag ${VERSION} already exists. Skipping release creation."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Create and push git tag
        if: steps.tag_check.outputs.should_release == 'true'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin "$VERSION"
  create_release:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Create GitHub release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ needs.prepare.outputs.version }}';

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              generate_release_notes: true
            });
  build_and_upload:
    needs:
      - prepare
      - create_release
    if: needs.prepare.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_arch: amd64
            runs_on: ubuntu-24.04
          - artifact_arch: arm64
            runs_on: ubuntu-24.04 # to change to arm64 runners once available
    runs-on: ${{ matrix.runs_on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.9.1
        with:
          bazelisk-cache: true
          disk-cache: kubeair
          repository-cache: true
          save-cache: ${{ github.ref == 'refs/heads/main' }}

      - name: Set up just
        uses: extractions/setup-just@v2

      - name: Build release binary
        run: just build ${{ matrix.artifact_arch }}

      - name: Package artifact
        id: package
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          ARTIFACT="kubelet-${VERSION}-linux_${{ matrix.artifact_arch }}.tar.gz"

          mkdir -p dist
          cp bazel-bin/src/main dist/kubelet

          tar -C dist -czf "$ARTIFACT" kubelet
          sha256sum "$ARTIFACT" > "${ARTIFACT}.sha256"

          echo "artifact=$ARTIFACT" >> "$GITHUB_OUTPUT"

      - name: Upload release assets
        uses: actions/github-script@v7
        env:
          TAG: ${{ needs.prepare.outputs.version }}
          ARTIFACT: ${{ steps.package.outputs.artifact }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const tag = process.env.TAG;
            const files = [process.env.ARTIFACT, `${process.env.ARTIFACT}.sha256`];

            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag
            });

            for (const filePath of files) {
              const data = fs.readFileSync(filePath);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                name: path.basename(filePath),
                data,
                headers: {
                  'content-type': 'application/octet-stream',
                  'content-length': data.length
                }
              });
            }