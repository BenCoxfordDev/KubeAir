name: Release

on:
  push:
    branches:
      - main
    paths:
      - Cargo.toml
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to rebuild assets for, for example v1.33.0
        required: false
        type: string
      rebuild_assets:
        description: Rebuild and replace assets on an existing release tag
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-24.04

    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.tag_check.outputs.should_release }}
      create_tag: ${{ steps.tag_check.outputs.create_tag }}
      create_release: ${{ steps.tag_check.outputs.create_release }}
      checkout_ref: ${{ steps.tag_check.outputs.checkout_ref }}
      rebuild_assets: ${{ steps.tag_check.outputs.rebuild_assets }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve version
        id: version
        shell: bash
        run: |
          INPUT_TAG="${{ github.event.inputs.tag || '' }}"

          if [[ -n "$INPUT_TAG" ]]; then
            if [[ "$INPUT_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              VERSION="$INPUT_TAG"
            elif [[ "$INPUT_TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              VERSION="v${INPUT_TAG}"
            else
              echo "Invalid workflow_dispatch tag: $INPUT_TAG"
              echo "Expected format: vMAJOR.MINOR.PATCH or MAJOR.MINOR.PATCH"
              exit 1
            fi
          else
            VERSION_RAW="$(awk '
              /^\[workspace\.package\]/ { in_section=1; next }
              in_section && /^\[/ { in_section=0 }
              in_section && /^version[[:space:]]*=/ {
                if (match($0, /"([^"]+)"/, m)) {
                  print m[1]
                  exit
                }
              }
            ' Cargo.toml)"

            if [[ -z "$VERSION_RAW" ]]; then
              echo "Could not read workspace.package version from Cargo.toml"
              exit 1
            fi

            if [[ ! "$VERSION_RAW" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Invalid version format in Cargo.toml: $VERSION_RAW"
              echo "Expected format: MAJOR.MINOR.PATCH"
              exit 1
            fi

            VERSION="v${VERSION_RAW}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Check tag availability
        id: tag_check
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REBUILD_ASSETS="${{ github.event.inputs.rebuild_assets || 'false' }}"
          # If triggered by a push (Cargo.toml change), treat it as a rebuild request
          if [[ "${{ github.event_name }}" == 'push' ]]; then
            REBUILD_ASSETS='true'
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${VERSION}" > /dev/null 2>&1; then
            if [[ "$REBUILD_ASSETS" == 'true' ]]; then
              echo "Tag ${VERSION} exists. Rebuilding release assets."
              echo "should_release=true" >> "$GITHUB_OUTPUT"
              echo "create_tag=false" >> "$GITHUB_OUTPUT"
              echo "create_release=false" >> "$GITHUB_OUTPUT"
              echo "checkout_ref=${VERSION}" >> "$GITHUB_OUTPUT"
              echo "rebuild_assets=true" >> "$GITHUB_OUTPUT"
            else
              echo "Tag ${VERSION} already exists. Skipping release creation."
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              echo "create_tag=false" >> "$GITHUB_OUTPUT"
              echo "create_release=false" >> "$GITHUB_OUTPUT"
              echo "checkout_ref=${VERSION}" >> "$GITHUB_OUTPUT"
              echo "rebuild_assets=false" >> "$GITHUB_OUTPUT"
            fi
          else
            if [[ "$REBUILD_ASSETS" == 'true' ]]; then
              echo "Tag ${VERSION} does not exist. Cannot rebuild release assets."
              exit 1
            fi

            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "create_tag=true" >> "$GITHUB_OUTPUT"
            echo "create_release=true" >> "$GITHUB_OUTPUT"
            echo "checkout_ref=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "rebuild_assets=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create and push git tag
        if: steps.tag_check.outputs.create_tag == 'true'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin "$VERSION"
  create_release:
    needs: prepare
    if: needs.prepare.outputs.create_release == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Create GitHub release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ needs.prepare.outputs.version }}';

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              generate_release_notes: true
            });
  build_and_upload:
    needs:
      - prepare
      - create_release
    if: always() && needs.prepare.outputs.should_release == 'true' && (needs.create_release.result == 'success' || needs.create_release.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_arch: amd64
            runs_on: ubuntu-24.04
          - artifact_arch: arm64
            runs_on: ubuntu-24.04 # to change to arm64 runners once available
    runs-on: ${{ matrix.runs_on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.9.1
        with:
          bazelisk-cache: ${{ needs.prepare.outputs.rebuild_assets == 'true' && 'false' || 'true' }}
          disk-cache: ${{ needs.prepare.outputs.rebuild_assets == 'true' && '' || 'kubeair' }}
          repository-cache: ${{ needs.prepare.outputs.rebuild_assets == 'true' && 'false' || 'true' }}
          save-cache: ${{ needs.prepare.outputs.rebuild_assets == 'false' }}

      - name: Clean Bazel state before rebuild
        shell: bash
        run: bazel clean --expunge

      - name: Set up just
        uses: extractions/setup-just@v2

      - name: Build release binary
        run: just build ${{ matrix.artifact_arch }}

      - name: Package artifact
        id: package
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          ARTIFACT="kubelet-${VERSION}-linux_${{ matrix.artifact_arch }}.tar.gz"

          mkdir -p dist
          case "${{ matrix.artifact_arch }}" in
            amd64) cp bazel-bin/src/kubelet_linux_x86_64 dist/kubelet ;;
            arm64) cp bazel-bin/src/kubelet_linux_arm64  dist/kubelet ;;
          esac

          tar -C dist -czf "$ARTIFACT" kubelet
          sha256sum "$ARTIFACT" > "${ARTIFACT}.sha256"

          echo "artifact=$ARTIFACT" >> "$GITHUB_OUTPUT"

      - name: Upload release assets
        uses: actions/github-script@v7
        env:
          TAG: ${{ needs.prepare.outputs.version }}
          ARTIFACT: ${{ steps.package.outputs.artifact }}
          REBUILD_ASSETS: ${{ needs.prepare.outputs.rebuild_assets }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const tag = process.env.TAG;
            const files = [process.env.ARTIFACT, `${process.env.ARTIFACT}.sha256`];
            const shouldReplaceAssets = process.env.REBUILD_ASSETS === 'true';

            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag
            });

            const existingAssets = new Map(
              release.assets.map((asset) => [asset.name, asset.id])
            );

            for (const filePath of files) {
              const fileName = path.basename(filePath);

              if (existingAssets.has(fileName)) {
                if (!shouldReplaceAssets) {
                  core.setFailed(`Release asset already exists: ${fileName}`);
                  return;
                }

                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: existingAssets.get(fileName)
                });
              }

              const data = fs.readFileSync(filePath);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                name: fileName,
                data,
                headers: {
                  'content-type': 'application/octet-stream',
                  'content-length': data.length
                }
              });
            }