name: K8s Upstream Go E2E

# Runs upstream Kubernetes Go conformance/e2e tests against a k3s cluster
# provisioned with the kube-air kubelet inside the CI build container.
#
# All execution happens inside a privileged build container — no systemd needed.

on:
  workflow_dispatch:
    inputs:
      upstream_k8s_version:
        description: "Upstream Kubernetes release for test binaries (v1.33.0, 1.33.0, stable, stable-1.33)"
        required: false
        default: ""
        type: string
      run_conformance:
        description: "Run upstream conformance suite"
        required: false
        default: true
        type: boolean
      run_e2e:
        description: "Run upstream non-conformance e2e suite"
        required: false
        default: false
        type: boolean
      conformance_focus:
        description: "Regex focus for conformance"
        required: false
        default: "\\[Conformance\\]"
        type: string
      conformance_skip:
        description: "Regex skip for conformance"
        required: false
        default: "\\[Serial\\]|\\[Slow\\]|\\[Disruptive\\]|\\[Flaky\\]"
        type: string
      e2e_focus:
        description: "Regex focus for e2e"
        required: false
        default: "\\[sig-node\\]"
        type: string
      e2e_skip:
        description: "Regex skip for e2e"
        required: false
        default: "\\[Serial\\]|\\[Slow\\]|\\[Disruptive\\]|\\[Flaky\\]"
        type: string
      ginkgo_nodes:
        description: "Parallel ginkgo nodes"
        required: false
        default: "4"
        type: string

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ARTIFACT_DIR: /tmp/k8s-upstream-go-e2e-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  kubernetes-go-e2e:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/bencoxforddev/kubeair/build:1.33
      options: --privileged
    timeout-minutes: 180

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────

      - name: Checkout kube-air
        uses: actions/checkout@v4

      # ── Bazel ─────────────────────────────────────────────────────────────────

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.9.1
        with:
          bazelisk-cache: true
          disk-cache: kubeair
          repository-cache: true
          save-cache: ${{ github.ref == 'refs/heads/main' }}

      - name: Ensure bazel symlink
        run: ln -sf "$(which bazelisk)" /usr/local/bin/bazel

      # ── Build kube-air kubelet ─────────────────────────────────────────────────

      - name: Build kube-air kubelet
        shell: bash
        run: just build

      # ── Provision k3s cluster ──────────────────────────────────────────────────

      - name: Provision k3s cluster
        shell: bash
        run: |
          chmod +x hack/e2e/setup-node-k3s.sh
          KUBELET_BIN="$GITHUB_WORKSPACE/bazel-bin/src/main" \
          bash hack/e2e/setup-node-k3s.sh 2>&1 | tee /tmp/setup-k3s.log

      - name: Upload setup log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: setup-k3s-log
          path: /tmp/setup-k3s.log
          if-no-files-found: ignore

      # ── Run upstream Go tests ──────────────────────────────────────────────────

      - name: Start memory monitor
        shell: bash
        run: |
          chmod +x hack/e2e/memory-monitor.sh
          bash hack/e2e/memory-monitor.sh /tmp/kubelet.pid /tmp/kubelet-memory.csv 2 &
          echo $! > /tmp/memory-monitor.pid
          echo "Memory monitor started (PID $(cat /tmp/memory-monitor.pid))"

      - name: Run upstream Kubernetes Go e2e/conformance
        shell: bash
        env:
          KUBECONFIG: /etc/rancher/k3s/k3s.yaml
          ARTIFACT_DIR: ${{ env.ARTIFACT_DIR }}
          UPSTREAM_K8S_VERSION: ${{ inputs.upstream_k8s_version }}
          RUN_CONFORMANCE: ${{ inputs.run_conformance && '1' || '0' }}
          RUN_E2E: ${{ inputs.run_e2e && '1' || '0' }}
          CONFORMANCE_FOCUS: ${{ inputs.conformance_focus }}
          CONFORMANCE_SKIP: ${{ inputs.conformance_skip }}
          E2E_FOCUS: ${{ inputs.e2e_focus }}
          E2E_SKIP: ${{ inputs.e2e_skip }}
          GINKGO_NODES: ${{ inputs.ginkgo_nodes }}
        run: |
          chmod +x hack/e2e/kubernetes/run-upstream-go-e2e.sh
          bash hack/e2e/kubernetes/run-upstream-go-e2e.sh 2>&1 | tee /tmp/upstream-go-e2e.log

      - name: Stop memory monitor and report
        if: always()
        shell: bash
        run: |
          if [[ -f /tmp/memory-monitor.pid ]]; then
            kill "$(cat /tmp/memory-monitor.pid)" 2>/dev/null || true
          fi
          chmod +x hack/e2e/memory-report.sh
          bash hack/e2e/memory-report.sh /tmp/kubelet-memory.csv

      # ── Artifacts ─────────────────────────────────────────────────────────────

      - name: Collect cluster diagnostics on failure
        if: failure()
        shell: bash
        env:
          KUBECONFIG: /etc/rancher/k3s/k3s.yaml
        run: |
          mkdir -p "$ARTIFACT_DIR/cluster-state"
          k3s kubectl get nodes -o wide > "$ARTIFACT_DIR/cluster-state/nodes.txt" 2>&1 || true
          k3s kubectl get pods --all-namespaces -o wide > "$ARTIFACT_DIR/cluster-state/pods.txt" 2>&1 || true
          k3s kubectl get events --all-namespaces --sort-by=.lastTimestamp > "$ARTIFACT_DIR/cluster-state/events.txt" 2>&1 || true
          tail -200 /tmp/kubelet.log > "$ARTIFACT_DIR/cluster-state/kubelet.log" 2>&1 || true
          tail -100 /tmp/k3s-server.log > "$ARTIFACT_DIR/cluster-state/k3s-server.log" 2>&1 || true

      - name: Upload upstream Go e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k8s-upstream-go-e2e-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ env.ARTIFACT_DIR }}/
            /tmp/upstream-go-e2e.log
            /tmp/setup-k3s.log
            /tmp/k3s-server.log
            /tmp/kubelet.log
            /tmp/kubelet-memory.csv
          if-no-files-found: ignore
