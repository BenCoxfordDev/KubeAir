name: K8s Upstream Go E2E

# Runs upstream Kubernetes Go conformance/e2e tests against a single-node
# Kubernetes cluster provisioned with the kube-air kubelet inside the CI build
# container. No systemd or k3s required — pure upstream binaries.

on:
  workflow_dispatch:
    inputs:
      run_conformance:
        description: "Run upstream conformance suite"
        required: false
        default: true
        type: boolean
      run_e2e:
        description: "Run upstream non-conformance e2e suite"
        required: false
        default: false
        type: boolean
      conformance_focus:
        description: "Regex focus for conformance"
        required: false
        default: "\\[Conformance\\]"
        type: string
      conformance_skip:
        description: "Regex skip for conformance"
        required: false
        default: "\\[Serial\\]|\\[Slow\\]|\\[Disruptive\\]|\\[Flaky\\]|\\[Privileged:ClusterAdmin\\]|two untainted nodes"
        type: string
      e2e_focus:
        description: "Regex focus for e2e"
        required: false
        default: "\\[sig-node\\]"
        type: string
      e2e_skip:
        description: "Regex skip for e2e"
        required: false
        default: "\\[Serial\\]|\\[Slow\\]|\\[Disruptive\\]|\\[Flaky\\]"
        type: string
      ginkgo_nodes:
        description: "Parallel ginkgo nodes"
        required: false
        default: "4"
        type: string

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ARTIFACT_DIR: /tmp/k8s-upstream-go-e2e-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  version:
    runs-on: ubuntu-24.04
    outputs:
      k8s_tag: ${{ steps.read.outputs.k8s_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Read Kubernetes image tag from .version
        id: read
        run: |
          K8S_VERSION=$(cat .version | tr -d '[:space:]')
          K8S_TAG=$(echo "$K8S_VERSION" | sed 's/^v//' | cut -d. -f1,2)
          echo "k8s_tag=${K8S_TAG}" >> "$GITHUB_OUTPUT"

  kubernetes-go-e2e:
    needs: [version]
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/bencoxforddev/kubeair/build:${{ needs.version.outputs.k8s_tag }}
      options: --privileged
    timeout-minutes: 180

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────

      - name: Checkout kube-air
        uses: actions/checkout@v4

      # ── Bazel ─────────────────────────────────────────────────────────────────

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: kubeair
          repository-cache: true
          cache-save: ${{ github.ref == 'refs/heads/main' }}

      - name: Ensure bazel symlink
        run: ln -sf "$(which bazelisk)" /usr/local/bin/bazel

      # ── Build kube-air kubelet ─────────────────────────────────────────────────

      - name: Build kube-air kubelet
        shell: bash
        run: |
          just build
          echo "Built: bazel-bin/src/main ($(du -sh bazel-bin/src/main | cut -f1))"

      # ── Provision cluster + run tests ─────────────────────────────────────────
      # Delegates to run-go-e2e-in-container.sh — the same script used by
      # `just go-e2e` locally. SKIP_BUILD=1 since we already built above.
      # Test binary version is auto-detected from the cluster server version.

      - name: Provision cluster and run upstream Go e2e/conformance
        shell: bash
        env:
          SKIP_BUILD: "1"
          RESET_EXISTING: "0"
          KUBEAIR_REPO_PATH: ${{ github.workspace }}
          ARTIFACT_DIR: ${{ env.ARTIFACT_DIR }}
          RUN_CONFORMANCE: ${{ inputs.run_conformance && '1' || '0' }}
          RUN_E2E: ${{ inputs.run_e2e && '1' || '0' }}
          CONFORMANCE_FOCUS: ${{ inputs.conformance_focus }}
          CONFORMANCE_SKIP: ${{ inputs.conformance_skip }}
          E2E_FOCUS: ${{ inputs.e2e_focus }}
          E2E_SKIP: ${{ inputs.e2e_skip }}
          GINKGO_NODES: ${{ inputs.ginkgo_nodes }}
        run: bash hack/e2e/run-go-e2e-in-container.sh 2>&1 | tee /tmp/go-e2e-in-container.log

      # ── Artifacts ─────────────────────────────────────────────────────────────

      - name: Collect cluster diagnostics on failure
        if: failure()
        shell: bash
        env:
          KUBECONFIG: /etc/kubernetes/admin.conf
        run: |
          mkdir -p "$ARTIFACT_DIR/cluster-state"
          kubectl get nodes -o wide > "$ARTIFACT_DIR/cluster-state/nodes.txt" 2>&1 || true
          kubectl get pods --all-namespaces -o wide > "$ARTIFACT_DIR/cluster-state/pods.txt" 2>&1 || true
          kubectl get events --all-namespaces --sort-by=.lastTimestamp > "$ARTIFACT_DIR/cluster-state/events.txt" 2>&1 || true
          tail -200 /tmp/kubelet.log > "$ARTIFACT_DIR/cluster-state/kubelet.log" 2>&1 || true
          tail -100 /tmp/kube-apiserver.log > "$ARTIFACT_DIR/cluster-state/kube-apiserver.log" 2>&1 || true
          tail -100 /tmp/etcd.log > "$ARTIFACT_DIR/cluster-state/etcd.log" 2>&1 || true
          tail -100 /tmp/kube-proxy.log > "$ARTIFACT_DIR/cluster-state/kube-proxy.log" 2>&1 || true

      - name: Upload upstream Go e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k8s-upstream-go-e2e-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ env.ARTIFACT_DIR }}/
            /tmp/go-e2e-in-container.log
            /tmp/kube-apiserver.log
            /tmp/etcd.log
            /tmp/kubelet.log
            /tmp/kubelet-memory.csv
          if-no-files-found: ignore
