name: Test
on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - '**/*.rs'
      - '**/Cargo.lock'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-24.04
    env:
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Rust toolchain is preinstalled
        shell: bash
        run: |
          echo "Runner: $RUNNER_NAME ($RUNNER_OS/$RUNNER_ARCH)"
          command -v rustc
          command -v cargo
          rustc --version
          cargo --version

      - name: Install protoc
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          protoc --version

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust-test"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run all test suites
        shell: bash
        run: |
          cargo test --workspace --lib --bins --all-features --locked
          cargo test --test integration --all-features --locked
          cargo test --test integration_runtime_network_storage --all-features --locked
          cargo test --test integration_resource_orchestration --all-features --locked
          cargo test --test conformance --all-features --locked
          cargo test --test smoke --all-features --locked

  coverage:
    needs: test
    runs-on: ubuntu-24.04
    env:
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Rust toolchain is preinstalled
        shell: bash
        run: |
          echo "Runner: $RUNNER_NAME ($RUNNER_OS/$RUNNER_ARCH)"
          command -v rustc
          command -v cargo
          command -v rustup
          rustc --version
          cargo --version
          rustup --version

      - name: Install protoc
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          protoc --version

      - name: Install coverage tooling
        shell: bash
        run: |
          rustup component add llvm-tools-preview
          cargo install cargo-llvm-cov --locked

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust-coverage"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Generate coverage report
        shell: bash
        run: |
          mkdir -p coverage
          cargo llvm-cov --workspace --all-features --locked --lcov --output-path coverage/lcov.info
          cargo llvm-cov report --summary-only > coverage/summary.txt

      - name: Publish coverage summary
        shell: bash
        run: |
          echo "### Test Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          cat coverage/summary.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage/lcov.info
            coverage/summary.txt
