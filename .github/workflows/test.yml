name: Test
on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'crates/**/*.rs'
      - 'tests/e2e/**'
      - 'hack/e2e/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  version:
    runs-on: ubuntu-24.04
    outputs:
      k8s_tag: ${{ steps.read.outputs.k8s_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Read Kubernetes image tag from .version
        id: read
        run: |
          K8S_VERSION=$(cat .version | tr -d '[:space:]')
          K8S_TAG=$(echo "$K8S_VERSION" | sed 's/^v//' | cut -d. -f1,2)
          echo "k8s_tag=${K8S_TAG}" >> "$GITHUB_OUTPUT"

  check-changes:
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check relevant paths
        id: filter
        shell: bash
        run: |
          CHANGED=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")
          if echo "$CHANGED" | grep -qE '^(src/|crates/.*\.rs$|tests/e2e/|hack/e2e/|Cargo\.toml$|Cargo\.lock$|\.github/workflows/test\.yml$)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: [check-changes, version]
    if: always() && github.ref != 'refs/heads/main' && (github.event_name != 'pull_request' || needs.check-changes.outputs.relevant == 'true')
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/bencoxforddev/kubeair/build:${{ needs.version.outputs.k8s_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.9.1
        with:
          bazelisk-cache: true
          disk-cache: kubeair
          repository-cache: true
          save-cache: ${{ github.ref == 'refs/heads/main' }}

      - name: Ensure bazel symlink
        run: ln -sf "$(which bazelisk)" /usr/local/bin/bazel

      - name: Run all test suites
        run: just test

  coverage:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [version]
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/bencoxforddev/kubeair/build:${{ needs.version.outputs.k8s_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.9.1
        with:
          bazelisk-cache: true
          disk-cache: kubeair
          repository-cache: true
          save-cache: ${{ github.ref == 'refs/heads/main' }}

      - name: Ensure bazel symlink
        run: ln -sf "$(which bazelisk)" /usr/local/bin/bazel

      - name: Generate coverage report
        shell: bash
        run: |
          bazel coverage //... --combined_report=lcov
          mkdir -p coverage
          cp bazel-out/_coverage/_coverage_report.dat coverage/lcov.info
          lcov --summary coverage/lcov.info > coverage/summary.txt 2>&1 || true

      - name: Publish coverage summary
        shell: bash
        run: |
          echo "### Test Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          cat coverage/summary.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage/lcov.info
            coverage/summary.txt
