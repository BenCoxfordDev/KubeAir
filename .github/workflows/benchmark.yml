name: Benchmark
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  version:
    runs-on: ubuntu-24.04
    outputs:
      k8s_tag: ${{ steps.read.outputs.k8s_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Read Kubernetes image tag from .version
        id: read
        run: |
          K8S_VERSION=$(cat .version | tr -d '[:space:]')
          K8S_TAG=$(echo "$K8S_VERSION" | sed 's/^v//' | cut -d. -f1,2)
          echo "k8s_tag=${K8S_TAG}" >> "$GITHUB_OUTPUT"

  check-changes:
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check relevant paths
        id: filter
        shell: bash
        run: |
          CHANGED=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")
          if echo "$CHANGED" | grep -qE '^(src/|crates/.*\.rs$|tests/e2e/|hack/e2e/|Cargo\.toml$|Cargo\.lock$|\.github/workflows/benchmark\.yml$)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  benchmark:
    needs: [check-changes, version]
    if: always() && (github.event_name != 'pull_request' || needs.check-changes.outputs.relevant == 'true')
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/bencoxforddev/kubeair/build:${{ needs.version.outputs.k8s_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: kubeair
          repository-cache: true
          cache-save: ${{ github.ref == 'refs/heads/main' }}

      - name: Ensure bazel symlink
        run: ln -sf "$(which bazelisk)" /usr/local/bin/bazel

      - name: Benchmark
        run: just bench 2>&1 | tee benchmark.log

      - name: Parse and Display Benchmark Results
        if: always()
        shell: bash
        run: |
          echo "# Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Extract benchmark results from the log (Criterion format)
          echo "## Performance Metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "(time:|thrpt:|change:)" benchmark.log | tail -80 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Extract criterion results if available
          if find . -path '*/criterion/*/raw.json' -quit 2>/dev/null; then
            echo "## Criterion Benchmark Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            find . -path '*/criterion/*/raw.json' -exec echo "Found criterion output" \; | head -1 >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Pod Scaling: Memory (RSS)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if grep -q "Pods   Ctrs" benchmark.log; then
            echo "| Pods | Containers/Pod | RSS Before | RSS After | Delta | Per-Pod |" >> $GITHUB_STEP_SUMMARY
            echo "| ---: | ---: | ---: | ---: | ---: | ---: |" >> $GITHUB_STEP_SUMMARY
            awk '
              /Pods   Ctrs/ { in_table=1; next }
              /Note: RSS measurements/ { in_table=0 }
              in_table && /│/ {
                n = split($0, parts, "│")
                if (n < 6) next

                left = parts[1]
                gsub(/^ +| +$/, "", left)
                split(left, cols, / +/)
                pods = cols[1]
                ctrs = cols[2]

                before = parts[2]
                after = parts[3]
                delta = parts[4]
                perpod = parts[5]

                gsub(/^ +| +$/, "", before)
                gsub(/^ +| +$/, "", after)
                gsub(/^ +| +$/, "", delta)
                gsub(/^ +| +$/, "", perpod)

                if (pods ~ /^[0-9]+$/ && ctrs ~ /^[0-9]+$/) {
                  printf("| %s | %s | %s | %s | %s | %s |\\n", pods, ctrs, before, after, delta, perpod)
                }
              }
            ' benchmark.log >> $GITHUB_STEP_SUMMARY
          else
            echo "Memory scaling report not found in benchmark output." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Pod Scaling: CPU (Time/Op)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Wall-time per operation from Criterion (lower is better)." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if grep -Eq "pod_manager/upsert_pods/[0-9]+ +time:" benchmark.log; then
            echo "| Benchmark | Pods | Estimated Time/Op |" >> $GITHUB_STEP_SUMMARY
            echo "| --- | ---: | ---: |" >> $GITHUB_STEP_SUMMARY
            awk '
              match($0, /pod_manager\/upsert_pods\/([0-9]+)/, m) {
                pods = m[1]
                if (match($0, /time:[[:space:]]*\[[^ ]+[[:space:]]+[^ ]+[[:space:]]+([^]]+)\]/, t)) {
                  est = t[1]
                  gsub(/^ +| +$/, "", est)
                  printf("| pod_manager/upsert_pods | %s | %s |\\n", pods, est)
                }
              }
            ' benchmark.log >> $GITHUB_STEP_SUMMARY
          else
            echo "Pod manager CPU scaling lines not found in benchmark output." >> $GITHUB_STEP_SUMMARY
          fi

          if grep -Eq "server_pod_list/list_pods_count/[0-9]+ +time:" benchmark.log; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Benchmark | Pods | Estimated Time/Op |" >> $GITHUB_STEP_SUMMARY
            echo "| --- | ---: | ---: |" >> $GITHUB_STEP_SUMMARY
            awk '
              match($0, /server_pod_list\/list_pods_count\/([0-9]+)/, m) {
                pods = m[1]
                if (match($0, /time:[[:space:]]*\[[^ ]+[[:space:]]+[^ ]+[[:space:]]+([^]]+)\]/, t)) {
                  est = t[1]
                  gsub(/^ +| +$/, "", est)
                  printf("| server_pod_list/list_pods_count | %s | %s |\\n", pods, est)
                }
              }
            ' benchmark.log >> $GITHUB_STEP_SUMMARY
          fi
          
          # Display a summary in the logs
          echo ""
          echo "═══════════════════════════════════════════════════════"
          echo "           BENCHMARK EXECUTION COMPLETED              "
          echo "═══════════════════════════════════════════════════════"
          echo ""
          
          # Print final summary lines from benchmark log
          if grep -q "test result:" benchmark.log; then
            echo "Test Results:"
            grep "test result:" benchmark.log | tail -1
          fi
          
          echo ""
          echo "Full benchmark log saved to: benchmark.log"
          echo "Criterion results available at: target/criterion/"