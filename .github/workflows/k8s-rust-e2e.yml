name: K8s Rust E2E

# Full integration test: provision a single-node k3s cluster, deploy the
# kube-air kubelet, and run Rust conformance + live cluster e2e tests.
#
# Topology (all inside a privileged CI build container — no systemd needed):
#   k3s server --disable-agent   (API server, etcd, scheduler, controller-mgr)
#   containerd                   (CRI)
#   kube-air kubelet             (node agent, connects to k3s API server)
#   bridge CNI                   (pod networking)
#
# Mirrors hack/e2e/run-e2e.sh for local macOS development.
#
# Triggers:
#   workflow_dispatch  — manual run with tunable parameters
#   push to main       — on changes to kubelet source or e2e scripts

on:
  workflow_dispatch:
    inputs:
      run_unit_tests:
        description: "Run unit/conformance/smoke tests"
        required: false
        default: "1"
        type: string
      run_e2e_tests:
        description: "Run live cluster e2e tests"
        required: false
        default: "1"
        type: string
      reset_existing:
        description: "Uninstall existing k3s before provisioning"
        required: false
        default: "0"
        type: string

  pull_request:

  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'crates/**/*.rs'
      - 'tests/e2e/**'
      - 'hack/e2e/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

env:
  RUN_UNIT_TESTS:     ${{ inputs.run_unit_tests     || '1' }}
  RUN_E2E_TESTS:      ${{ inputs.run_e2e_tests      || '1' }}
  RESET_EXISTING:     ${{ inputs.reset_existing      || '0' }}
  ARTIFACT_DIR:       /tmp/kubeair-e2e-artifacts-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  check-changes:
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check relevant paths
        id: filter
        shell: bash
        run: |
          CHANGED=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")
          if echo "$CHANGED" | grep -qE '^(src/|crates/.*\.rs$|tests/e2e/|hack/e2e/|Cargo\.toml$|Cargo\.lock$|rust-toolchain\.toml$|\.github/workflows/k8s-rust-e2e\.yml$)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  kubernetes-rust-e2e:
    needs: [check-changes]
    if: always() && (github.event_name != 'pull_request' || needs.check-changes.outputs.relevant == 'true')
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/bencoxforddev/kubeair/build:1.33
      options: --privileged
    timeout-minutes: 60

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────

      - name: Checkout kube-air
        uses: actions/checkout@v4

      # ── Bazel ─────────────────────────────────────────────────────────────────

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.9.1
        with:
          bazelisk-cache: true
          disk-cache: kubeair
          repository-cache: true
          save-cache: ${{ github.ref == 'refs/heads/main' }}

      - name: Ensure bazel symlink
        run: ln -sf "$(which bazelisk)" /usr/local/bin/bazel

      # ── Build kube-air kubelet ─────────────────────────────────────────────────

      - name: Build kube-air kubelet
        shell: bash
        run: |
          just build
          echo "Built: bazel-bin/src/main ($(du -sh bazel-bin/src/main | cut -f1))"

      # ── Provision cluster ──────────────────────────────────────────────────────

      - name: Provision k3s cluster
        shell: bash
        run: |
          chmod +x hack/e2e/setup-node-k3s.sh
          KUBELET_BIN="$GITHUB_WORKSPACE/bazel-bin/src/main" \
          RESET_EXISTING="$RESET_EXISTING" \
          bash hack/e2e/setup-node-k3s.sh 2>&1 | tee /tmp/setup-k3s.log

      - name: Upload setup log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: setup-k3s-log
          path: /tmp/setup-k3s.log
          if-no-files-found: ignore

      # ── Run tests ──────────────────────────────────────────────────────────────

      - name: Start memory monitor
        shell: bash
        run: |
          chmod +x hack/e2e/memory-monitor.sh
          bash hack/e2e/memory-monitor.sh /tmp/kubelet.pid /tmp/kubelet-memory.csv 2 &
          echo $! > /tmp/memory-monitor.pid
          echo "Memory monitor started (PID $(cat /tmp/memory-monitor.pid))"

      - name: Run kube-air test suites
        shell: bash
        run: |
          chmod +x hack/e2e/run-cluster-tests.sh
          KUBECONFIG=/etc/rancher/k3s/k3s.yaml \
          KUBEAIR_REPO_PATH="$GITHUB_WORKSPACE" \
          RUN_UNIT_TESTS="$RUN_UNIT_TESTS" \
          RUN_E2E_TESTS="$RUN_E2E_TESTS" \
          ARTIFACT_DIR="$ARTIFACT_DIR" \
          bash hack/e2e/run-cluster-tests.sh 2>&1 | tee /tmp/run-cluster-tests.log

      - name: Stop memory monitor and report
        if: always()
        shell: bash
        run: |
          if [[ -f /tmp/memory-monitor.pid ]]; then
            kill "$(cat /tmp/memory-monitor.pid)" 2>/dev/null || true
          fi
          chmod +x hack/e2e/memory-report.sh
          bash hack/e2e/memory-report.sh /tmp/kubelet-memory.csv

      # ── Artifacts ─────────────────────────────────────────────────────────────

      - name: Collect cluster state on failure
        if: failure()
        shell: bash
        run: |
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
          mkdir -p "$ARTIFACT_DIR/cluster-state"
          k3s kubectl get pods --all-namespaces -o wide \
            > "$ARTIFACT_DIR/cluster-state/pods.txt" 2>&1 || true
          k3s kubectl get nodes -o wide \
            > "$ARTIFACT_DIR/cluster-state/nodes.txt" 2>&1 || true
          k3s kubectl describe nodes \
            > "$ARTIFACT_DIR/cluster-state/describe-nodes.txt" 2>&1 || true
          k3s kubectl get events --all-namespaces --sort-by=.lastTimestamp \
            > "$ARTIFACT_DIR/cluster-state/events.txt" 2>&1 || true
          tail -200 /tmp/kubelet.log \
            > "$ARTIFACT_DIR/cluster-state/kubelet.log" 2>&1 || true
          tail -100 /tmp/k3s-server.log \
            > "$ARTIFACT_DIR/cluster-state/k3s-server.log" 2>&1 || true
          tail -100 /tmp/containerd.log \
            > "$ARTIFACT_DIR/cluster-state/containerd.log" 2>&1 || true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k3s-e2e-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ env.ARTIFACT_DIR }}/
            /tmp/setup-k3s.log
            /tmp/run-cluster-tests.log
            /tmp/k3s-server.log
            /tmp/kubelet.log
            /tmp/containerd.log
            /tmp/kubelet-memory.csv
          if-no-files-found: ignore
