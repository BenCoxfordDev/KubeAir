name: Build Binaries

on:
  workflow_dispatch:
    inputs:
      architecture:
        description: Architecture to build
        required: true
        type: choice
        options:
          - amd64
          - arm64
          - both
        default: both

permissions:
  contents: read
  packages: read

jobs:
  build:
    name: Build ${{ matrix.artifact_arch }}
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/bencoxforddev/kubeair/build:1.33
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(
          github.event.inputs.architecture == 'amd64' && '[{"artifact_arch":"amd64"}]' ||
          github.event.inputs.architecture == 'arm64' && '[{"artifact_arch":"arm64"}]' ||
          '[{"artifact_arch":"amd64"},{"artifact_arch":"arm64"}]'
          ) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: kubeair
          repository-cache: true
          save-cache: ${{ github.ref == 'refs/heads/main' }}

      - name: Ensure bazel symlink
        run: ln -sf "$(which bazelisk)" /usr/local/bin/bazel

      - name: Build kubelet
        run: just build ${{ matrix.artifact_arch }}

      - name: Package artifact
        id: package
        shell: bash
        run: |
          ARTIFACT="kubelet-linux_${{ matrix.artifact_arch }}.tar.gz"

          mkdir -p dist
          cp bazel-bin/src/main dist/kubelet

          tar -C dist -czf "$ARTIFACT" kubelet
          sha256sum "$ARTIFACT" > "${ARTIFACT}.sha256"

          echo "artifact=$ARTIFACT" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: kubelet-${{ matrix.artifact_arch }}
          path: |
            ${{ steps.package.outputs.artifact }}
            ${{ steps.package.outputs.artifact }}.sha256
          if-no-files-found: error

      - name: Publish artifact link
        shell: bash
        env:
          ARTIFACT_ID: ${{ steps.upload.outputs.artifact-id }}
          ARTIFACT_NAME: ${{ steps.upload.outputs.artifact-name }}
        run: |
          URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${ARTIFACT_ID}"

          {
            echo "### Build output (${{ matrix.artifact_arch }})"
            echo
            echo "- Artifact: ${ARTIFACT_NAME}"
            echo "- Download: ${URL}"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "Artifact (${ARTIFACT_NAME}): ${URL}"