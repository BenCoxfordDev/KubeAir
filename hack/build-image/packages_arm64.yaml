version: 1

# Debian Trixie snapshot pinned for reproducibility.
# To update the snapshot date, change the URL below, delete packages_arm64.lock.json,
# then regenerate: just lock-build-image
sources:
  - channel: trixie main
    url: https://snapshot.debian.org/archive/debian/20260601T000000Z

archs:
  - arm64

packages:
  # TLS / APT infrastructure
  - apt-transport-https
  - ca-certificates
  - gnupg
  - lsb-release

  # Build essentials
  - curl
  - gcc-14
  - g++-14
  - git
  - jq
  - libc6-dev
  - libstdc++-14-dev
  - pkg-config
  - protobuf-compiler
  - tar
  - xz-utils

  # Kubernetes node dependencies (needed by kubeadm / kubelet e2e setup)
  - socat
  - conntrack
  - ipset
  - ipvsadm
  - ebtables
  - ethtool
  - iptables

  # Container runtime
  - containerd
  - containernetworking-plugins

  # Coverage
  - lcov
